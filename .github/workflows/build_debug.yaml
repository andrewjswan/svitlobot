name: Build / Debug

on:
  workflow_call:
    inputs:
      release-summary:
        description: Summary of the release
        required: false
        type: string
        default: ""
      release-url:
        description: URL to the release notes
        required: false
        type: string
        default: ""
      release-version:
        description: Version of the release
        required: false
        type: string
        default: ""

  workflow_dispatch:

jobs:
  configuration:
    name: Build configuration list
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Get All-In-One matrix
        id: set-matrix
        run: echo "matrix=$(ls *.yaml | jq -R -s -c 'split("\n")[:-1]')" >> $GITHUB_OUTPUT
        working-directory: svitlobot
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Generate version
        id: version
        run: |
          if [ -n "${{ inputs.release-version }}" ]; then
            version=${{ inputs.release-version }}
          else
            version=dev-$(date +'%Y%m%d-%H%M')
          fi
          echo version=$version >> $GITHUB_OUTPUT

  build-svitlobot-debug:
    name: Build (DBG) ${{ matrix.config-file }}
    needs:
      - configuration
      - prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config-file: ${{ fromJson(needs.configuration.outputs.matrix) }}
      fail-fast: false
    outputs:
      original-name: ${{ steps.esphome-build.outputs.original-name }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Prepare Debug | Dev
        id: prepare
        run: |
          configfile=${{ matrix.config-file }}
          configfile="${configfile/svitlobot_/svitlobot_debug_}"

          mkdir svitlobot_debug

          cp svitlobot/${{ matrix.config-file }} svitlobot_debug/$configfile
          sed -i "/import/d" svitlobot_debug/$configfile
          sed -i 's/name: "svitlobot"/name: "svitlobot_debug"/g' svitlobot_debug/$configfile
          
          sed -i "s/Svitlo Bot/SvitloBot | Debug/g" packages/esp32.yaml
          sed -i "s/Svitlo Bot/SvitloBot | Debug/g" packages/esp8266.yaml

          sed -i "s/level: INFO/level: DEBUG/g" packages/common.yaml
          sed -i "s/log: false/log: true/g" packages/common.yaml

          echo config-file=$configfile >> $GITHUB_OUTPUT

      - name: Build firmware
        uses: esphome/build-action@v7
        id: esphome-build
        with:
          yaml-file: svitlobot_debug/${{ steps.prepare.outputs.config-file }}
          version: latest
          complete-manifest: true
          release-summary: ${{ inputs.release-summary }}
          release-url: ${{ inputs.release-url }}
      - name: Move files for versioning
        run: |
          mkdir -p output/${{ needs.prepare.outputs.version }}
          mv ${{ steps.esphome-build.outputs.name }}/* output/${{ needs.prepare.outputs.version }}/
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('SvitloBot-Debug-{0}', steps.esphome-build.outputs.name) }}
          path: output

  combine-svitlobot-healthcheck:
    name: Combine (DBG) manifests
    needs:
      - prepare
      - build-svitlobot-debug
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: files
          pattern: SvitloBot-Debug-*

      - name: Get artifact names
        id: artifacts
        run: |
          artifacts=$(ls --format=single-column files)
          echo "artifacts<<EOF" >> $GITHUB_OUTPUT
          echo "$artifacts" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5.0.0
        with:
          name: ${{ steps.artifacts.outputs.artifacts }}

      - name: Combine all parts into a single manifest
        run: |
          version="${{ needs.prepare.outputs.version }}"
          mkdir -p "output/$version"
          pushd files
          for device in *; do
            pushd $device
            pushd $version
            cp * "../../../output/$version/"
            popd
            popd
          done
          popd
          jq -s '(.[0] | del(.builds)) + {"builds": (reduce .[].builds as $b ([]; . + $b))}' files/*/$version/manifest.json > output/$version/svitlobot-debug-manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SvitloBot-Debug
          path: output

  build-svitlobot-dev:
    name: Build (DEV) ${{ matrix.config-file }}
    needs:
      - configuration
      - prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config-file: ${{ fromJson(needs.configuration.outputs.matrix) }}
      fail-fast: false
    outputs:
      original-name: ${{ steps.esphome-build.outputs.original-name }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Prepare SvitloBot | Custom URL
        id: prepare
        run: |
          configfile=${{ matrix.config-file }}
          configfile="${configfile/svitlobot_/svitlobot_dev_}"

          mkdir svitlobot_dev

          cp svitlobot/${{ matrix.config-file }} svitlobot_dev/$configfile
          sed -i "/import/d" svitlobot_dev/$configfile
          sed -i 's/name: "svitlobot"/name: "svitlobot_dev"/g' svitlobot_dev/$configfile
          
          sed -i "s/Svitlo Bot/SvitloBot | Debug/g" packages/esp32.yaml
          sed -i "s/Svitlo Bot/SvitloBot | Debug/g" packages/esp8266.yaml

          sed -i "s/level: INFO/level: DEBUG/g" packages/common.yaml
          sed -i "s/log: false/log: true/g" packages/common.yaml

          echo config-file=$configfile >> $GITHUB_OUTPUT

      - name: Build firmware
        uses: esphome/build-action@v7
        id: esphome-build
        with:
          yaml-file: svitlobot_dev/${{ steps.prepare.outputs.config-file }}
          version: dev
          complete-manifest: true
          release-summary: ${{ inputs.release-summary }}
          release-url: ${{ inputs.release-url }}
      - name: Move files for versioning
        run: |
          mkdir -p output/${{ needs.prepare.outputs.version }}
          mv ${{ steps.esphome-build.outputs.name }}/* output/${{ needs.prepare.outputs.version }}/
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('SvitloBot-DEV-{0}', steps.esphome-build.outputs.name) }}
          path: output

  combine-svitlobot-custom_url:
    name: Combine (DEV) manifests
    needs:
      - prepare
      - build-svitlobot-dev
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: files
          pattern: SvitloBot-DEV-*

      - name: Get artifact names
        id: artifacts
        run: |
          artifacts=$(ls --format=single-column files)
          echo "artifacts<<EOF" >> $GITHUB_OUTPUT
          echo "$artifacts" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete artifacts
        uses: geekyeggo/delete-artifact@v5.0.0
        with:
          name: ${{ steps.artifacts.outputs.artifacts }}

      - name: Combine all parts into a single manifest
        run: |
          version="${{ needs.prepare.outputs.version }}"
          mkdir -p "output/$version"
          pushd files
          for device in *; do
            pushd $device
            pushd $version
            cp * "../../../output/$version/"
            popd
            popd
          done
          popd
          jq -s '(.[0] | del(.builds)) + {"builds": (reduce .[].builds as $b ([]; . + $b))}' files/*/$version/manifest.json > output/$version/svitlobot-dev-manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SvitloBot-DEV
          path: output
