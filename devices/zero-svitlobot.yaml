substitutions:
  device: "esp_svitlobot_zero"
  name: "svitlobot-zero"
  friendly_name: "Svitlo Bot"
  path: "devices/"

dashboard_import:
  package_import_url: github://andrewjswan/svitlobot/devices/zero-svitlobot.yaml@main

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

packages:
  remote_package:
    url: https://github.com/andrewjswan/svitlobot
    files:
      - packages/common.yaml
      - packages/svitlobot.yaml
      - packages/esp32.yaml
      - packages/http_ota.yaml
    refresh: 1s

script:
  - id: !extend before_svitlobot_request
    then:
      - light.turn_on:
          id: status_led
          brightness: 50%
          red: 0%
          green: 0%
          blue: 100%
          transition_length: 1s
      - lambda: delay(1000);

  - id: !extend after_svitlobot_request
    then:
      - if:
          condition:
            lambda: 'return id(svitlobot_status).state;'
          then:
            - light.turn_on:
                id: status_led
                brightness: 50%
                red: 0%
                green: 100%
                blue: 0%
                transition_length: 1s
            - lambda: delay(3000);
            - light.turn_off:
                id: status_led
                transition_length: 1s
          else:
            - light.turn_on:
                id: status_led
                brightness: 50%
                red: 100%
                green: 0%
                blue: 0%
                transition_length: 1s

  - id: !extend without_svitlobot_request
    then:
      - light.turn_on:
          id: status_led
          brightness: 50%
          red: 100%
          green: 100%
          blue: 0%
          transition_length: 1s

light:
  - name: "LED"
    id: status_led
    icon: mdi:lighthouse
    platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: 21
    num_leds: 1
    chipset: WS2812
    restore_mode: ALWAYS_OFF
    web_server:
      sorting_weight: 5
